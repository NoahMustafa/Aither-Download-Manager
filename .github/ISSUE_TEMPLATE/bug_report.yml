name: Bug Report
description: Something in Aither isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Aither version
      description: Settings → About
      placeholder: "0.1.7"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Logs are encrypted and secrets are redacted before writing — safe to paste/attach. Found at %APPDATA%\Aither\logs\
      render: shell
